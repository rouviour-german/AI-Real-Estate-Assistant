[mypy]
python_version = 3.11
mypy_path = apps/api
explicit_package_bases = True
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
warn_unreachable = True
strict_optional = True
no_incremental = True
files = apps/api/agents, apps/api/models, apps/api/vector_store, apps/api/data, apps/api/analytics
exclude = (?x)
    ^tests/|
    ^scripts/|
    ^docs/|
    ^ui/|
    ^node_modules/|
    ^apps/web/|
    ^\.next/|
    ^\.history/|
    ^venv/|
    ^\.venv/|
    ^\.venv_ci/

[mypy-agents.*]
strict = True

[mypy-models.*]
strict = True

[mypy-vector_store.*]
strict = True

[mypy-data.*]
strict = True

[mypy-analytics.*]
strict = True
